<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Controlled Effects</title>

<style>
body {
    margin: 0;
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

h1 {
    margin-top: 20px;
}

button {
    padding: 12px 24px;
    font-size: 16px;
    border: none;
    background: #00c3ff;
    color: black;
    border-radius: 8px;
    cursor: pointer;
    margin: 20px;
}

#webcam-container {
    margin-top: 10px;
}

canvas {
    border-radius: 12px;
}

#effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
}

.effect {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
}

#loading {
    position: fixed;
    inset: 0;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="loading">Loading Model...</div>

<h1>Gesture Controlled Effects</h1>
<button onclick="startApp()">Start Camera</button>

<div id="webcam-container"></div>
<div id="label-container"></div>
<div id="effects"></div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
/* ✅ REPLACE THIS WITH YOUR HOSTED MODEL URL */
const URL = "https://teachablemachine.withgoogle.com/models/PoD2MZmbC/";

let model, webcam, labelContainer, maxPredictions;
let lastTriggerTime = 0;
const cooldown = 1200;

function startApp() {
    document.getElementById("loading").style.display = "flex";
    init();
}

async function init() {
    try {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(300, 300, flip);

        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("loading").style.display = "none";

    } catch (error) {
        console.error("MODEL LOAD ERROR:", error);
        document.getElementById("loading").innerText =
            "Error loading model. Check console.";
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const predictions = await model.predict(webcam.canvas);

    let highest = predictions[0];
    for (let i = 1; i < predictions.length; i++) {
        if (predictions[i].probability > highest.probability) {
            highest = predictions[i];
        }
    }

    predictions.forEach((p, i) => {
        labelContainer.childNodes[i].innerHTML =
            p.className + ": " + p.probability.toFixed(2);
    });

    const now = Date.now();

    if (highest.probability > 0.90 && now - lastTriggerTime > cooldown) {
        if (highest.className === "Explosion") {
            triggerExplosion();
        } else if (highest.className === "Gravity pull") {
            triggerGravity();
        }
        lastTriggerTime = now;
    }
}

function triggerExplosion() {
    const container = document.getElementById("effects");

    for (let i = 0; i < 20; i++) {
        const particle = document.createElement("div");
        particle.classList.add("effect");

        const x = window.innerWidth / 2;
        const y = window.innerHeight / 2;

        particle.style.left = x + "px";
        particle.style.top = y + "px";
        particle.style.background = "orange";

        const angle = Math.random() * 2 * Math.PI;
        const distance = 200 + Math.random() * 200;

        particle.animate([
            { transform: "translate(0,0)", opacity: 1 },
            {
                transform: `translate(${Math.cos(angle) * distance}px, ${Math.sin(angle) * distance}px)`,
                opacity: 0
            }
        ], {
            duration: 800,
            easing: "ease-out"
        });

        container.appendChild(particle);
        setTimeout(() => particle.remove(), 800);
    }
}

function triggerGravity() {
    const container = document.getElementById("effects");

    for (let i = 0; i < 25; i++) {
        const particle = document.createElement("div");
        particle.classList.add("effect");

        const startX = Math.random() * window.innerWidth;
        const startY = Math.random() * window.innerHeight;

        particle.style.left = startX + "px";
        particle.style.top = startY + "px";
        particle.style.background = "cyan";

        const centerX = window.innerWidth / 2 - startX;
        const centerY = window.innerHeight / 2 - startY;

        particle.animate([
            { transform: "translate(0,0)", opacity: 1 },
            {
                transform: `translate(${centerX}px, ${centerY}px)`,
                opacity: 0
            }
        ], {
            duration: 1000,
            easing: "ease-in"
        });

        container.appendChild(particle);
        setTimeout(() => particle.remove(), 1000);
    }
}
</script>

</body>
</html>
